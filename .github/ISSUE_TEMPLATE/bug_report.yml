name: Bug Report
description: Report incorrect diagnostics, missed diagnostics, or crashes.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal Go Sample
      description: Provide the smallest Go snippet that reproduces the issue.
      render: go
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: golangci-lint Config
      description: Include the relevant `.golangci.yml` and custom linter settings.
      render: yaml
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Include Go, golangci-lint, and golangci-lint-legibility versions.
      placeholder: "go1.25.0, golangci-lint v2.12.2, legibility v0.1.0"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
