name: Homebrew

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  formula:
    name: Formula
    runs-on: macos-latest
    env:
      FORMULA: golangci-lint-legibility
      TAP: yowainwright/golangci-lint-legibility
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Tap formula
        run: brew tap "$TAP" "$GITHUB_WORKSPACE"

      - name: Trust tap
        run: brew trust --tap "$TAP"

      - name: Install formula from source
        run: brew install --build-from-source "$FORMULA"

      - name: Test formula
        run: brew test "$FORMULA"

      - name: Audit formula
        run: brew audit --formula "$FORMULA"
